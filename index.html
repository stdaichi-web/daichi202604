<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会社名 | 公式サイト</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }
    header {
      background: #0d47a1;
      color: white;
      padding: 1rem;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 15px;
      padding: 0;
    }
    nav a {
      color: white;
      text-decoration: none;
    }
    .hero {
      background: url('https://via.placeholder.com/1200x400') no-repeat center/cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }
    .section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <h1>会社名</h1>
    <ul>
      <li><a href="#about">会社概要</a></li>
      <li><a href="#services">事業内容</a></li>
      <li><a href="#contact">お問い合わせ</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <h2>未来をつくるテクノロジー</h2>
  <p>私たちは革新的なソリューションを提供します</p>
</section>

<section id="about" class="section">
  <h2>会社概要</h2>
  <p>ここに会社の説明文が入ります。設立年、理念、強みなどを記載してください。</p>
</section>

<section id="services" class="section">
  <h2>事業内容</h2>
  <div class="services">
    <div class="card">
      <h3>サービス1</h3>
      <p>サービスの説明</p>
    </div>
    <div class="card">
      <h3>サービス2</h3>
      <p>サービスの説明</p>
    </div>
    <div class="card">
      <h3>サービス3</h3>
      <p>サービスの説明</p>
    </div>
  </div>
</section>

<section id="contact" class="section">
  <h2>お問い合わせ</h2>
  <form>
    <label>お名前:</label><br>
    <input type="text" name="name"><br><br>

    <label>メール:</label><br>
    <input type="email" name="email"><br><br>

    <label>内容:</label><br>
    <textarea name="message"></textarea><br><br>

    <button type="submit">送信</button>
  </form>
</section>

<footer>
  <p> 2026 会社名. All Rights Reserved.</p>
</footer>

</body>
</html>
