<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Todoリスト</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      background: #fff;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
      margin-left: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      padding: 8px;
      background: #eee;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    li.completed {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Todoリスト</h1>
  <input type="text" id="todoInput" placeholder="やることを入力">
  <button onclick="addTodo()">追加</button>

  <ul id="todoList"></ul>
</div>

<script>
  // 🔹 初期表示（保存データ読み込み）
  document.addEventListener("DOMContentLoaded", loadTodos);

  // 🔹 Enterキー対応（ここに書くのが正解）
  const input = document.getElementById("todoInput");
  input.addEventListener("keypress", e => {
    if (e.key === "Enter") addTodo();
  });

  function addTodo() {
    const input = document.getElementById("todoInput");
    const text = input.value.trim();

    if (text === "") return;

    createTodoElement(text, false);
    saveTodos();

    input.value = "";
  }

  function createTodoElement(text, completed) {
    const li = document.createElement("li");

    if (completed) li.classList.add("completed");

    li.innerHTML = `
      <span onclick="toggleComplete(this)">${text}</span>
      <span class="delete" onclick="deleteTodo(this)">×</span>
    `;

    document.getElementById("todoList").appendChild(li);
  }

  function deleteTodo(el) {
    el.parentElement.remove();
    saveTodos();
  }

  function toggleComplete(el) {
    el.parentElement.classList.toggle("completed");
    saveTodos();
  }

  // 🔹 保存処理
  function saveTodos() {
    const todos = [];
    document.querySelectorAll("#todoList li").forEach(li => {
      todos.push({
        text: li.innerText.replace("×", "").trim(),
        completed: li.classList.contains("completed")
      });
    });
    localStorage.setItem("todos", JSON.stringify(todos));
  }

  // 🔹 読み込み処理
  function loadTodos() {
    const todos = JSON.parse(localStorage.getItem("todos")) || [];
    todos.forEach(todo => {
      createTodoElement(todo.text, todo.completed);
    });
  }
</script>

</body>
</html>
